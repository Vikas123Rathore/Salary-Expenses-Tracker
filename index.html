<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash flow| Salary & Expenses Trackers</title>

  <!-- Tailwind css CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- chart cdn -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- for font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- chart -->

  <!--  PDF CODE cdn -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-black min-h-screen">
  <!-- Header -->
  <div class="max-w-7xl mx-auto rounded-lg  mt-2 px-4 py-4 md:p-6">
    <header
      class=" w-full bg-slate-900 text-white p-4 space-y-2 rounded-2xl flex flex-col md:flex-row md:items-center justify-between">
      <div class="flex items-center gap-3 flex-col justify-start">
        <h1 class="text-2xl font-bold">Cash Flow Tracker</h1>
        <p class="text-gray-400 pl-16">Track your salary and expenses effectively</p>
      </div>
      <div>
        <!--  CURRENCY CONVERTER UI START -->

        <div class="flex items-center gap-3 mt-3 pr-12">

          <label class="text-white">
            Convert INR To:
          </label>

          <select id="currencySelect" class="bg-slate-700 text-white px-3 py-2 rounded-lg">
            <option value="INR">INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="AED">AED</option>
          </select>

        </div>

        <!--  CURRENCY CONVERTER UI END -->
      </div>
    </header>

    <!-- main content -->
    <div class="flex gap-4 md:gap-6 flex-col md:flex-row border border-gray-400 rounded-4xl mt-4 p-4 bg-slate-900">
      <!-- left side -->
      <div class="flex md:w-[30%] w-[100%] mx-auto mt-10 gap-4  p-4 rounded-lg flex-col">

        <!-- Add salary  -->
        <div
          class="w-full border border-gray-200 bg-gray-900 rounded-2xl px-4 py-2 mb-4 hover:scale-[1.02] transition duration-200">
          <h2 class="text-xl font-semibold  text-green-300">SET SALARY</h2>
          <form id="salaryForm" class="w-full py-2">
            <div class="mb-4">
              <label for="salaryAmount" class="block text-gray-300 mb-2 ">MONTHLY SALARY</label>
              <input type="number" id="salaryAmount"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder:text-gray-500 bg-slate-300"
                placeholder="Enter salary amount">
              <p id="salaryError" class="text-red-500 text-sm mt-2"></p>
            </div>
            <button type="submit"
              class="w-full bg-pink-500 text-white py-2 rounded-lg hover:bg-green-600 transition duration-200 cursor-pointer">Save
              Salary</button>
          </form>
        </div>



        <!-- Add Expenses -->
        <div
          class="w-full border border-gray-200 bg-gray-900 rounded-2xl px-4 py-2 mb-4 hover:scale-[1.02] transition duration-200">
          <h2 class="text-xl font-semibold  text-green-300">LOG EXPENSES</h2>
          <form class="w-full py-4" id="salaryExpenses">
            <div class="mb-4">
              <label for="expensesName" class="block text-gray-300 mb-2 uppercase">Expense Name</label>
              <input type="text" id="expensesName"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder:text-gray-500 bg-slate-300 mb-4"
                placeholder="e.g. Rent, Food, etc.">
              <label for="expenseAmount" class="block text-gray-300 mb-2 uppercase">Expense Amount</label>
              <input type="number" id="expenseAmount"
                class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder:text-gray-500 bg-slate-300"
                placeholder="e.g. 50000, etc.">
              <p id="expenseError" class="text-red-500 text-sm mt-2"></p>
            </div>
            <button type="submit"
              class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-green-600 transition duration-200 cursor-pointer">Save
              Expense</button>
          </form>
        </div>

      </div>

      <!-- right section -->
      <div class="  w-full md:w-[65%] mt-10 p-4 rounded-lg mx-auto">

        <div class="flex flex-col md:flex-row gap-4">
          <div
            class="bg-gray-900 text-slate-300 rounded-2xl border border-slate-400 w-full md:w-[33%] p-4 mb-4 md:mb-0 h-[100px] uppercase hover:scale-[1.02] transition duration-200">
            Total Salary
            <p id="totalSalary" class="text-2xl font-bold text-blue-400 mt-2">0</p>

          </div>
          <div
            class="bg-gray-900 text-slate-300 rounded-2xl border border-slate-400 w-full md:w-[33%] p-4 mb-4 md:mb-0 h-[100px] uppercase hover:scale-[1.02] transition duration-200">
            total Expenses
            <p id="totalExpenses" class="text-2xl font-bold text-blue-400 mt-2">0</p>
          </div>
          <div
            class="bg-gray-900 text-slate-300 rounded-2xl border border-slate-400 w-full md:w-[33%] p-4 mb-4 md:mb-0 h-[100px] uppercase hover:scale-[1.02] transition duration-200">
            Remaining Balance
            <p id="remainingBalance" class="text-2xl font-bold text-blue-400 mt-2">0</p>
          </div>
        </div>

        <!-- Expenses record -->
        <div
          class="bg-gray-900 text-slate-300 rounded-2xl border border-slate-400 w-full p-4 mt-4 min-h-[200px] hover:scale-[1.02] transition duration-200">
          <div class="flex justify-between items-center">
            <h2 class="text-xl font-semibold text-green-300 mb-2">Expense List</h2>
            <p>
              Live DOM update
            </p>
          </div>
          <ul class="list-none text-gray-400" id="expenseList">
            <!-- Expense items will be dynamically added here -->

          </ul>
        </div>
        <!-- expense visualisation -->
        <div
          class="bg-gray-900 rounded-2xl border border-slate-400 w-full p-4 mt-4 h-[500px] hover:scale-[1.02] transition duration-200 flex flex-col">
          <h2 class="text-white text-2xl font-bold">Expense Visualization</h2>
          <div class="flex justify-center items-center h-full">
            <div class="w-1/2 h-[300px] " id="chart">
              <canvas id="myChart"></canvas>
            </div>
          </div>
          <!--  PDF CODE START -->
          <div class="mt-4">
            <button id="downloadPdf" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
              Download PDF Report
            </button>
          </div>
        </div>
      </div>

    </div>

  </div>
</body>
<script src="script.js">

</script>

</html>
